app-id: net.pedropaulo.OzemPDF
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable
command: ozempdf

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=ipc
  - --share=network
  - --device=dri
  - --filesystem=home:ro
  - --filesystem=xdg-documents:ro
  - --filesystem=xdg-download
  - --filesystem=xdg-desktop:ro
  - --env=G_MESSAGES_DEBUG=all

modules:
  - name: ghostscript
    buildsystem: autotools
    cleanup:
      - /share/man
    sources:
      - type: archive
        url: https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10050/ghostscript-10.05.0.tar.gz
        sha256: "7783c6744780d229cf1e5e6e0e4ff48d5c59ce3e0b0986c9937b4e4e54c8c6b1"

  - name: ozempdf
    buildsystem: simple
    build-commands:
      - |
        . /usr/lib/sdk/node20/enable.sh
        . /usr/lib/sdk/rust-stable/enable.sh
        npm ci
        npm run build
        cargo build --release --manifest-path src-tauri/Cargo.toml
        install -Dm755 src-tauri/target/release/ozempdf ${FLATPAK_DEST}/bin/ozempdf
        install -Dm644 src-tauri/linux/net.pedropaulo.OzemPDF.metainfo.xml ${FLATPAK_DEST}/share/metainfo/net.pedropaulo.OzemPDF.metainfo.xml
        install -Dm644 src-tauri/linux/net.pedropaulo.OzemPDF.desktop ${FLATPAK_DEST}/share/applications/net.pedropaulo.OzemPDF.desktop
        install -Dm644 images/ozemPDF.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/net.pedropaulo.OzemPDF.svg
        install -Dm644 src-tauri/icons/128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/net.pedropaulo.OzemPDF.png
        install -Dm644 src-tauri/icons/128x128@2x.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/net.pedropaulo.OzemPDF.png
        install -Dm644 src-tauri/icons/32x32.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/net.pedropaulo.OzemPDF.png
    sources:
      - type: dir
        path: .