name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            rpm ghostscript

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: release-linux-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build packages
        run: npx tauri build --bundles deb,rpm,appimage

      - name: Fix .deb metadata
        run: bash scripts/fix-deb.sh

      - name: Upload Linux release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download Ghostscript for Windows
        run: |
          curl -L "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10051/gs10051w64.exe" -o C:\\ghostscript-setup.exe --silent
          "C:\\Program Files\\7-Zip\\7z.exe" x C:\\ghostscript-setup.exe -oC:\\ghostscript-extracted -y
          mkdir src-tauri\\gs-win\\bin
          mkdir src-tauri\\gs-win\\lib
          mkdir src-tauri\\gs-win\\Resource
          copy C:\\ghostscript-extracted\\bin\\gswin64c.exe src-tauri\\gs-win\\bin\\
          copy C:\\ghostscript-extracted\\bin\\gsdll64.dll src-tauri\\gs-win\\bin\\
          xcopy /s /y C:\\ghostscript-extracted\\lib\\* src-tauri\\gs-win\\lib\\
          xcopy /s /y C:\\ghostscript-extracted\\Resource\\* src-tauri\\gs-win\\Resource\\
          del C:\\ghostscript-setup.exe
          rmdir /s /q C:\\ghostscript-extracted

      - name: Install jq
        run: choco install jq -y

      - name: Inject GS resources into tauri.conf.json
        run: |
          cd src-tauri
          jq ".bundle.resources = [\"gs-win/*\"]" tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: release-windows-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build Windows installer
        run: npx tauri build --bundles msi

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}