name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            rpm ghostscript

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: release-linux-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build packages
        run: npx tauri build --bundles deb,rpm,appimage

      - name: Fix .deb metadata
        run: bash scripts/fix-deb.sh

      - name: Upload Linux release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download Ghostscript for Windows
        shell: pwsh
        run: |
          Write-Host "Downloading Ghostscript ZIP..."
          curl.exe -L "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10051/ghostpdl-10.05.1.tar.gz" -o C:\ghostscript.zip
          Write-Host "Extracting ZIP..."
          & "C:\Program Files\7-Zip\7z.exe" x C:\ghostscript.zip -oC:\ghostscript-extracted -y
          Write-Host "Copying gs-win files..."
          New-Item -ItemType Directory -Path src-tauri\gs-win\bin -Force
          New-Item -ItemType Directory -Path src-tauri\gs-win\lib -Force
          New-Item -ItemType Directory -Path src-tauri\gs-win\Resource -Force
          # Use uma versão conhecida que tenha a estrutura correta
          Copy-Item C:\ghostscript-extracted\ghostpdl-10.05.1\bin\gswin64c.exe src-tauri\gs-win\bin\
          Copy-Item C:\ghostscript-extracted\ghostpdl-10.05.1\bin\gsdll64.dll src-tauri\gs-win\bin\
          Copy-Item -Recurse C:\ghostscript-extracted\ghostpdl-10.05.1\lib\* src-tauri\gs-win\lib\
          Copy-Item -Recurse C:\ghostscript-extracted\ghostpdl-10.05.1\Resource\* src-tauri\gs-win\Resource\
          Write-Host "Final gs-win structure:"
          Get-ChildItem -Recurse src-tauri\gs-win
          Remove-Item C:\ghostscript.zip -Force
          Remove-Item C:\ghostscript-extracted -Recurse -Force

      - name: Inject GS resources into tauri.conf.json
        run: node -e "const f='src-tauri/tauri.conf.json'; const c=JSON.parse(require('fs').readFileSync(f,'utf8')); c.bundle.resources=['gs-win/*']; require('fs').writeFileSync(f,JSON.stringify(c,null,2));"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: release-windows-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build Windows installer
        shell: pwsh
        run: npx tauri build --bundles msi

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}